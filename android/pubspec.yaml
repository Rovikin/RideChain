name: ridechain
description: Decentralized peer-to-peer ride-hailing on Polygon PoS
version: 0.1.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # state management
  flutter_bloc:         ^8.1.3
  equatable:            ^2.0.5

  # navigation
  go_router:            ^12.0.0

  # web3 + crypto
  web3dart:             ^2.7.3
  pointycastle:         ^3.7.3
  bip39:                ^1.0.6
  bip32:                ^2.0.0
  hex:                  ^0.2.0

  # networking
  dio:                  ^5.3.2
  http:                 ^1.1.0
  web_socket_channel:   ^2.4.0

  # GPS and maps
  geolocator:           ^10.1.0
  flutter_map:          ^6.0.0
  latlong2:             ^0.9.0

  # background service
  flutter_foreground_task:    ^6.1.0
  flutter_background_service: ^5.0.0

  # storage
  flutter_secure_storage: ^9.0.0
  shared_preferences:     ^2.2.1
  sqflite:                ^2.3.0

  # UI
  flutter_svg:          ^2.0.9
  cached_network_image: ^3.3.0
  shimmer:              ^3.0.0
  fluttertoast:         ^8.2.4

  # utilities
  intl:                 ^0.18.1
  logger:               ^2.0.2
  freezed_annotation:   ^2.4.1
  json_annotation:      ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:        ^3.0.0
  build_runner:         ^2.4.6
  freezed:              ^2.4.5
  json_serializable:    ^6.7.1
  mocktail:             ^1.0.0
  bloc_test:            ^9.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
