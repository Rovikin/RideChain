name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Create valid Flutter project
        run: |
          flutter create --org com.ridechain --project-name ridechain /tmp/ridechain

          # show original build.gradle for debugging
          echo "=== ORIGINAL build.gradle ==="
          cat /tmp/ridechain/android/build.gradle

          rm -rf /tmp/ridechain/lib
          cp -r android/lib /tmp/ridechain/lib
          cp android/pubspec.yaml /tmp/ridechain/pubspec.yaml
          mkdir -p /tmp/ridechain/assets/fonts
          mkdir -p /tmp/ridechain/assets/images

          # fix minSdkVersion
          sed -i 's/minSdkVersion 19/minSdkVersion 26/g' \
            /tmp/ridechain/android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/g' \
            /tmp/ridechain/android/app/build.gradle

          # replace entire build.gradle with correct kotlin version
          cat > /tmp/ridechain/android/build.gradle << 'GRADLE'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          GRADLE

          echo "=== UPDATED build.gradle ==="
          cat /tmp/ridechain/android/build.gradle

          cp android/android_config/app/src/main/AndroidManifest.xml \
             /tmp/ridechain/android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        working-directory: /tmp/ridechain
        run: flutter pub get

      - name: Run analyzer
        working-directory: /tmp/ridechain
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: /tmp/ridechain
        run: flutter build apk --debug

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: /tmp/ridechain
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_STORE_FILE:     ${{ secrets.KEY_STORE_FILE }}
        run: |
          echo "$KEY_STORE_FILE" | base64 -d > /tmp/ridechain/android/app/keystore.p12
          cat > /tmp/ridechain/android/key.properties << PROPS
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/keystore.p12
          storeType=PKCS12
          PROPS
          flutter build apk --release

      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: ridechain-debug-${{ github.sha }}
          path: /tmp/ridechain/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: ridechain-release-${{ github.sha }}
          path: /tmp/ridechain/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
