name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Create valid Flutter project
        run: |
          flutter create \
            --org com.ridechain \
            --project-name ridechain \
            /tmp/ridechain

          rm -rf /tmp/ridechain/lib
          cp -r android/lib         /tmp/ridechain/lib
          cp    android/pubspec.yaml /tmp/ridechain/pubspec.yaml
          cp -r android/assets      /tmp/ridechain/assets

          # fix minSdkVersion
          sed -i 's/minSdkVersion 19/minSdkVersion 26/g' \
            /tmp/ridechain/android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 26/g' \
            /tmp/ridechain/android/app/build.gradle

          # fix kotlin version — must be 1.9.0+ for Flutter 3.19
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.0'/g" \
            /tmp/ridechain/android/build.gradle

          # verify kotlin version was updated
          grep "kotlin_version" /tmp/ridechain/android/build.gradle

          # fix AndroidManifest
          cat > /tmp/ridechain/android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
                    xmlns:tools="http://schemas.android.com/tools">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.VIBRATE" />

              <application
                  android:label="RideChain"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name="id.flutter.flutter_background_service.BackgroundService"
                      android:foregroundServiceType="location"
                      android:exported="false"
                      tools:replace="android:exported" />

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

              </application>
          </manifest>
          MANIFEST

      - name: Get dependencies
        working-directory: /tmp/ridechain
        run: flutter pub get

      - name: Run analyzer
        working-directory: /tmp/ridechain
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: /tmp/ridechain
        run: flutter build apk --debug

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: /tmp/ridechain
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_STORE_FILE:     ${{ secrets.KEY_STORE_FILE }}
        run: |
          echo "$KEY_STORE_FILE" | base64 -d > /tmp/ridechain/android/app/keystore.p12
          cat > /tmp/ridechain/android/key.properties << PROPS
          storePassword=$KEY_STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/keystore.p12
          storeType=PKCS12
          PROPS
          flutter build apk --release

      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: ridechain-debug-${{ github.sha }}
          path: /tmp/ridechain/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: ridechain-release-${{ github.sha }}
          path: /tmp/ridechain/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
